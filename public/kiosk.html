<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="preload" href="/lib/three.min.js" as="script"/>
  <link rel="preload" href="/lib/GLTFLoader.js" as="script"/>
  <link rel="preload" href="/lib/draco/draco_decoder.wasm" as="fetch" crossorigin/>
  <title>Avatar Kiosk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --surface2:  #1e1e2a;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #f0f0f5;
      --text-dim:  #8888aa;
      --success:   #22d3a0;
      --error:     #f87171;
      --warn:      #fbbf24;
      --border:    rgba(108,99,255,0.25);
    }

    /* ── Temi ─────────────────────────────────────── */
    :root[data-theme="rosso"]   { --accent:#e05252; --accent2:#f87171; --border:rgba(224,82,82,0.25); }
    :root[data-theme="arancio"] { --accent:#e07832; --accent2:#fb923c; --border:rgba(224,120,50,0.25); }
    :root[data-theme="verde"]   { --accent:#22c55e; --accent2:#4ade80; --border:rgba(34,197,94,0.25); }
    :root[data-theme="giallo"]  { --accent:#d4a017; --accent2:#fbbf24; --border:rgba(212,160,23,0.25); }
    :root[data-theme="blu"]     { --accent:#3b82f6; --accent2:#93c5fd; --border:rgba(59,130,246,0.25); }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
    }

    /* ─── Layout principale ─────────────────────────── */
    #app { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }

    /* ─── Header ────────────────────────────────────── */
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      z-index: 10; pointer-events: none;
    }

    /* ─── Avatar Panel ──────────────────────────────── */
    #avatar-panel { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 60%, #1a1030 0%, var(--bg) 70%); }

    /* ─── Loading spinner ───────────────────────── */
    #avatar-loader {
      position: absolute; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: var(--bg); transition: opacity .5s;
    }
    #avatar-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: .8rem; color: var(--text-dim); }

    #avatar-canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Ring "sta parlando" */
    #avatar-ring {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #avatar-ring.speaking {
      opacity: 1;
      animation: ring-pulse 1.2s ease-in-out infinite;
    }


    /* ─── Overlay chat ──────────────────────────────── */
    #chat-overlay-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 20;
      background: linear-gradient(
        to bottom,
        rgba(10,10,15,0) 0%,
        rgba(10,10,15,0.3) 35%,
        rgba(10,10,15,0.75) 65%
      );
    }

    /* ─── Pannello interazione ──────────────────────── */
    #interaction-panel {
      position: absolute; bottom: var(--chat-bottom, 0px);
      height: var(--overlay-height, 65vh);
      width: var(--chat-max-width, 100%);
      z-index: 60; display: flex; flex-direction: column;
      touch-action: pan-y;
      overflow: hidden;
      /* posizione orizzontale: sovrascritta da JS via --chat-align */
      left: 50%; right: auto; transform: translateX(-50%);
    }
    #interaction-panel.align-left   { left: 0;    right: auto; transform: none; }
    #interaction-panel.align-center { left: 50%;  right: auto; transform: translateX(-50%); }
    #interaction-panel.align-right  { left: auto; right: 0;    transform: none; }
    #input-area.hidden { display: none !important; }

    /* ─── Area risposta ─────────────────────────────── */
    #response-area {
      flex: 1 1 0;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 50%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 50%);
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: 20px 24px 12px;
      display: flex; flex-direction: column;
      position: relative; z-index: 22;
      scroll-behavior: smooth;
    }

    #interaction-panel {
      --chat-font-family: inherit;
      --chat-font-size: 1rem;
    }

    #chat-history {
      margin-top: auto;
      touch-action: pan-y;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transcript-bubble, .response-bubble-hist {
      font-family: var(--chat-font-family);
    }

    #response-area::-webkit-scrollbar { width: 4px; }
    #response-area::-webkit-scrollbar-track { background: transparent; }
    #response-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #response-area::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Indicatore "nuovo messaggio" */
    #scroll-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      padding: 4px 14px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
      z-index: 23;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(108,99,255,0.5);
    }

    /* Bolle nella cronologia (permanenti) */
    .transcript-bubble {
      align-self: flex-end;
      max-width: 90%;
      background: var(--accent);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      font-size: var(--chat-font-size);
      line-height: 1.5;
    }

    .response-bubble-hist {
      align-self: flex-start;
      max-width: 95%;
      background: rgba(30,30,42,0.6);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      padding: 14px 18px;
      font-size: var(--chat-font-size);
      line-height: 1.6;
      backdrop-filter: blur(8px);
    }

    .response-bubble-hist .label {
      font-size: calc(var(--chat-font-size) * 0.6);
      font-weight: 700;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent2);
      display: block;
      margin-bottom: 6px;
    }

    /* Markdown renderizzato nelle bolle avatar */
    .bubble-content p  { margin: 0 0 6px; }
    .bubble-content p:last-child { margin-bottom: 0; }
    .bubble-content strong { color: var(--accent2); }
    .bubble-content ul, .bubble-content ol { margin: 4px 0 4px 18px; }
    .bubble-content li { margin-bottom: 2px; }
    .bubble-content code {
      background: rgba(108,99,255,0.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.9em;
    }

    /* Bubble singola corrente (legacy, usata durante la digitazione) */
    #transcript-bubble {
      align-self: flex-end;
      max-width: 90%;
      background: var(--accent);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      padding: 14px 18px;
      font-size: var(--chat-font-size);
      font-family: var(--chat-font-family);
      line-height: 1.5;
      display: none;
    }

    #transcript-bubble .label {
      font-size: calc(var(--chat-font-size) * 0.6);
      font-weight: 700;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 6px;
    }

    #response-bubble {
      align-self: flex-start;
      max-width: 95%;
      background: rgba(30,30,42,0.6);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      padding: 18px 20px;
      font-size: var(--chat-font-size);
      font-family: var(--chat-font-family);
      line-height: 1.6;
      display: none;
      backdrop-filter: blur(8px);
    }

    #response-bubble .label {
      font-size: calc(var(--chat-font-size) * 0.6);
      font-weight: 700;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent2);
      display: block;
      margin-bottom: 8px;
    }

    .typing-indicator {
      align-self: flex-start;
      display: none;
      margin-top: 14px;
      gap: calc(var(--chat-font-size) * 0.35);
      padding: calc(var(--chat-font-size) * 0.75) calc(var(--chat-font-size) * 1.4);
      background: rgba(30,30,42,0.6);
      border-radius: 18px 18px 18px 4px;
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      font-family: var(--chat-font-family);
    }
    .typing-indicator.visible { display: flex; align-items: center; }
    .typing-indicator span {
      width: calc(var(--chat-font-size) * 0.38);
      height: calc(var(--chat-font-size) * 0.38);
      background: var(--accent2);
      border-radius: 50%;
      animation: typing 1.2s infinite;
      flex-shrink: 0;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    /* ─── Input testuale (fallback) ─────────────────── */
    #input-area { padding: 10px 20px 24px; padding-bottom: max(24px, env(safe-area-inset-bottom, 24px)); display: flex; gap: 10px; position: relative; z-index: 22; }

    #text-input {
      flex: 1;
      background: rgba(30,30,42,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-size: var(--chat-font-size, 1rem);
      outline: none;
      font-family: var(--chat-font-family, inherit);
      transition: border-color 0.2s;
      min-width: 0;
    }
    #text-input:focus { border-color: var(--accent); }
    #text-input::placeholder { color: var(--text-dim); }

    /* ─── Forme d'onda nei bottoni mic/audio ─────────── */
    .btn-wave {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 6px;
      box-sizing: border-box;
      pointer-events: none;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
    }
    .btn-wave-bar {
      flex: 1;
      max-width: 5px;
      border-radius: 3px;
      background: var(--wave-color, #fff);
      height: 4px;
      transition: height 0.07s ease;
    }
    @keyframes wave-bar {
      0%, 100% { height: 4px; }
      50%       { height: 28px; }
    }
    .audio-wave .btn-wave-bar,
    .mic-wave-anim .btn-wave-bar {
      animation: wave-bar 0.7s ease-in-out infinite;
    }
    .audio-wave .btn-wave-bar:nth-child(2),
    .mic-wave-anim .btn-wave-bar:nth-child(2) { animation-delay: 0.15s; }
    .audio-wave .btn-wave-bar:nth-child(3),
    .mic-wave-anim .btn-wave-bar:nth-child(3) { animation-delay: 0.3s;  }
    .audio-wave .btn-wave-bar:nth-child(4),
    .mic-wave-anim .btn-wave-bar:nth-child(4) { animation-delay: 0.15s; }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      width: 52px;
      align-self: stretch;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover  { background: var(--accent2); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.96); }
    #send-btn svg    { fill: white; width: 20px; height: 20px; }

    /* ─── Idle Overlay ──────────────────────────────── */
    body.idle-hidden #mic-btn,
    body.idle-hidden #audio-btn,
    body.idle-hidden #interaction-panel {
      opacity: 0 !important;
      pointer-events: none !important;
    }
    #idle-overlay-video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none;
    }
    #idle-overlay > *:not(#idle-overlay-video) { position: relative; z-index: 2; }
    #idle-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      z-index: 50;
      cursor: pointer;
      transition: opacity 0.5s;
      --idle-font-family: inherit;
      --idle-font-size: 1rem;
      --idle-bg-opacity: 1;
      font-family: var(--idle-font-family);
    }
    #idle-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10,10,15,1);
      background-color: inherit;
      background-image: inherit;
      background-size: cover;
      background-position: center;
      opacity: var(--idle-bg-opacity);
      transition: opacity 0.5s;
      z-index: 0;
    }
    #idle-overlay.hidden { opacity: 0; pointer-events: none; }

    .idle-avatar-icon {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, #3b0764 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      margin: 24px 0 28px;
      box-shadow: 0 0 60px rgba(108,99,255,0.5);
      animation: float 3s ease-in-out infinite;
      overflow: hidden;
    }
    .idle-avatar-icon img {
      width: 70%; height: 70%;
      object-fit: contain;
      border-radius: 0;
      display: none;
    }

    #idle-overlay h2 {
      font-size: calc(var(--idle-font-size) * 2);
      font-weight: 700;
      margin-bottom: 10px;
      font-family: var(--idle-font-family);
    }
    #idle-overlay h2:empty { display: none; }

    #idle-overlay p {
      font-size: calc(var(--idle-font-size) * 1.1);
      color: var(--text-dim);
      font-family: var(--idle-font-family);
    }
    #idle-overlay p:empty { display: none; }

    .tap-hint:empty { display: none; }
    .tap-hint {
      margin-top: 36px;
      font-size: calc(var(--idle-font-size) * 0.95);
      font-family: var(--idle-font-family);
      color: var(--accent2);
      border: 1px solid var(--border);
      padding: 12px 28px;
      border-radius: 24px;
      animation: float 2s ease-in-out infinite;
    }

    /* ─── Animazioni ────────────────────────────────── */
    @keyframes ring-pulse {
      0%, 100% { transform: translateX(-50%) scale(1);    opacity: 1; }
      50%       { transform: translateX(-50%) scale(1.08); opacity: 0.6; }
    }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ─── Pannello impostazioni ─────────────────────── */
    #settings-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 30;
    }

    #settings-toggle {
      width: 38px; height: 38px;
      background: rgba(13,13,20,0.85);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      margin-left: auto;
      transition: background 0.2s;
    }
    #settings-toggle:hover { background: var(--surface2); }

    #settings-body {
      display: none;
      margin-top: 8px;
      background: rgba(13,13,20,0.95);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      width: 230px;
      backdrop-filter: blur(10px);
    }
    #settings-body.open { display: block; }

    .settings-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent2);
      margin-bottom: 10px;
    }

    .slider-group {
      margin-bottom: 10px;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .slider-group label span {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    .slider-group input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: var(--accent); }

    /* ─── FBX Dropzone ──────────────────────────────── */
    #fbx-dropzone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.78rem;
      color: var(--text-dim);
      line-height: 1.5;
      margin-top: 6px;
    }
    #fbx-dropzone:hover, #fbx-dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
      color: var(--text);
    }
    #fbx-status {
      font-size: 0.75rem;
      margin-top: 6px;
      min-height: 18px;
      text-align: center;
      color: var(--text-dim);
    }
    #fbx-status.ok    { color: var(--success); }
    #fbx-status.error { color: var(--error); }
    #fbx-status.loading { color: var(--accent2); }

    /* ─── Layout responsive bottoni mic/audio ──────── */
    @media (max-width: 600px) {
      .idle-avatar-icon {
        width: 90px !important;
        height: 90px !important;
        font-size: 2.2rem !important;
        margin: 20px 0 16px !important;
      }
      #idle-overlay h2 {
        font-size: 1.3rem !important;
        margin-bottom: 6px !important;
      }
      #idle-overlay p {
        font-size: 1rem !important;
        margin-bottom: 6px !important;
      }
      .tap-hint {
        font-size: 0.85rem !important;
      }
      #mic-btn {
        top: auto !important;
        bottom: max(var(--btn-mobile-bottom, 20px), env(safe-area-inset-bottom, 4px)) !important;
        right: auto !important;
        left: calc(50% - var(--btn-half-total-w, 27px)) !important;
        width:  var(--mic-mobile-size, 22px) !important;
        height: var(--mic-mobile-size, 22px) !important;
      }
      #mic-btn img, #mic-btn span {
        width:  var(--mic-icon-mobile-size, 14px) !important;
        height: var(--mic-icon-mobile-size, 14px) !important;
        font-size: var(--mic-icon-mobile-size, 14px) !important;
      }
      #audio-btn {
        top: auto !important;
        bottom: max(var(--btn-mobile-bottom, 20px), env(safe-area-inset-bottom, 4px)) !important;
        right: auto !important;
        left: calc(50% - var(--btn-half-total-w, 27px) + var(--mic-mobile-size, 22px) + 10px) !important;
        width:  var(--audio-mobile-size, 22px) !important;
        height: var(--audio-mobile-size, 22px) !important;
      }
      #audio-btn img, #audio-btn span {
        width:  var(--audio-icon-mobile-size, 14px) !important;
        height: var(--audio-icon-mobile-size, 14px) !important;
        font-size: var(--audio-icon-mobile-size, 14px) !important;
      }
      #input-area input {
        font-size: 16px !important;
      }
      #interaction-panel {
        bottom: var(--mobile-panel-bottom, 80px) !important;
      }
    }
  </style>
</head>
<body class="idle-hidden">
<div id="app">

  <!-- Header -->
  <div id="header"></div>
  <div id="controls-section">
    <button id="mic-btn" onclick="toggleMic()" title="Attiva/disattiva microfono"
      style="position:absolute;top:1.67vh;right:2.96vw;background:rgba(248,113,113,.15);border:2px solid rgba(248,113,113,.4);
             border-radius:50%;width:44px;height:44px;padding:0;display:flex;align-items:center;
             justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;
             font-size:1.2rem;overflow:hidden;z-index:100">
      <img id="mic-icon-img" src="" alt="🎙" style="width:28px;height:28px;object-fit:contain;display:none"/>
      <img id="mic-icon-disabled-img" src="" alt="🎙" style="width:28px;height:28px;object-fit:contain;display:none"/>
      <span id="mic-icon-fallback">🎙</span>
      <div id="mic-wave" class="btn-wave" style="display:none"></div>
    </button>
    <button id="audio-btn" onclick="toggleAudio()" title="Attiva/disattiva audio"
      style="position:absolute;top:1.67vh;right:2.96vw;background:rgba(34,211,160,.15);border:2px solid rgba(34,211,160,.5);
             border-radius:50%;width:44px;height:44px;padding:0;display:flex;align-items:center;
             justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;

// ═══════════════════════════════════════════════════════════════════════════
//  VOICE ACTIVITY DETECTION
// ═══════════════════════════════════════════════════════════════════════════
class VAD {
  constructor(opts = {}) {
    this.threshold         = opts.threshold         ?? 0.012;
    this.silenceDuration   = opts.silenceDuration   ?? 1300;
    this.minSpeechDuration = opts.minSpeechDuration ?? 350;
    this.onSpeechStart     = opts.onSpeechStart     ?? (() => {});
    this.onSpeechEnd       = opts.onSpeechEnd       ?? (() => {});
    this.onVolume          = opts.onVolume          ?? (() => {});

    this._active    = false;
    this._paused    = false;
    this._speaking  = false;
    this._speechStart  = null;
    this._silenceStart = null;
    this._chunks    = [];
    this._recorder  = null;
    this._stream    = null;
    this._context   = null;
    this._analyser  = null;
    this._filter    = null;
    this._buffer    = null;
    this._rafId     = null;

    // Noise gate adattivo
    this._noiseFloor      = null;  // stimato durante il silenzio
    this._noiseHistory    = [];    // campioni RMS recenti in silenzio
    this._adaptiveThresh  = null;  // soglia = noiseFloor * multiplier
    this._NOISE_MULT      = 2.8;   // quanto sopra il rumore di fondo conta come voce
    this._NOISE_SAMPLES   = 30;    // campioni per stimare il rumore
  }

  async start() {
    this._stream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    this._context = new AudioContext();
    const source  = this._context.createMediaStreamSource(this._stream);

    // Filtro passa-banda voce umana (300–3400 Hz)
    this._filter = this._context.createBiquadFilter();
    this._filter.type = 'bandpass';
    this._filter.frequency.value = 1700;  // centro banda
    this._filter.Q.value = 0.8;

    this._analyser = this._context.createAnalyser();
    this._analyser.fftSize = 512;

    source.connect(this._filter);
    this._filter.connect(this._analyser);

    this._buffer = new Float32Array(this._analyser.fftSize);

    this._recorder = new MediaRecorder(this._stream);
    this._recorder.ondataavailable = e => { if (e.data.size > 0) this._chunks.push(e.data); };
    this._recorder.onstop = () => {
      const blob = new Blob(this._chunks, { type: 'audio/webm' });
      this._chunks = [];
      this.onSpeechEnd(blob);
    };

    this._active = true;
    this._tick();
  }

  pause()  { this._paused = true;  if (this._speaking) this._forceStop(); }
  resume() { this._paused = false; }

  stop() {
    this._active = false;
    if (this._rafId) cancelAnimationFrame(this._rafId);
    if (this._recorder?.state === 'recording') this._forceStop();
    this._stream?.getTracks().forEach(t => t.stop());
    this._context?.close();
  }

  _getRMS() {
    this._analyser.getFloatTimeDomainData(this._buffer);
    let sum = 0;
    for (let i = 0; i < this._buffer.length; i++) sum += this._buffer[i] ** 2;
    return Math.sqrt(sum / this._buffer.length);
  }

  _forceStop() {
    this._speaking = false;
    this._speechStart  = null;
    this._silenceStart = null;
    if (this._recorder.state === 'recording') this._recorder.stop();
  }

  _tick() {
    if (!this._active) return;
    this._rafId = requestAnimationFrame(() => this._tick());

    const rms = this._getRMS();
    this.onVolume(rms);

    if (this._paused) return;

    const now = Date.now();

    // Aggiorna stima rumore di fondo (solo in silenzio, non durante la registrazione)
    if (!this._speaking && !this._speechStart) {
      this._noiseHistory.push(rms);
      if (this._noiseHistory.length > this._NOISE_SAMPLES) this._noiseHistory.shift();
      if (this._noiseHistory.length >= 10) {
        const sorted = [...this._noiseHistory].sort((a, b) => a - b);
        // Usa il 75° percentile come stima rumore di fondo (ignora picchi casuali)
        this._noiseFloor = sorted[Math.floor(sorted.length * 0.75)];
        this._adaptiveThresh = Math.max(this.threshold, this._noiseFloor * this._NOISE_MULT);
      }
    }
    const activeThresh = this._adaptiveThresh ?? this.threshold;

    if (!this._speaking) {
      if (rms > activeThresh) {
        if (!this._speechStart) {
          // Avvia la registrazione subito per non perdere la prima parola
          this._speechStart = now;
          this._chunks = [];
          this._recorder.start();
        }
        if (now - this._speechStart >= this.minSpeechDuration) {
          this._speaking = true;
          this._silenceStart = null;
          this.onSpeechStart();
        }
      } else {
        if (this._speechStart && !this._speaking) {
          // Parlato troppo breve: scarta
          this._speechStart = null;
          if (this._recorder.state === 'recording') {
            this._recorder.ondataavailable = () => {};
            this._recorder.stop();
            this._recorder.ondataavailable = e => { if (e.data.size > 0) this._chunks.push(e.data); };
          }
          this._chunks = [];
        }
        if (!this._speechStart) { /* nessun reset necessario */ }
      }
    } else {
      if (rms < activeThresh) {
        if (!this._silenceStart) this._silenceStart = now;
        if (now - this._silenceStart >= this.silenceDuration) {
          this._speaking = false;
          this._silenceStart = null;
          this._speechStart  = null;
          if (this._recorder.state === 'recording') this._recorder.stop();
        }
      } else {
        this._silenceStart = null;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  WAKE WORD DETECTION (Web Speech API)
// ═══════════════════════════════════════════════════════════════════════════
function _buildWakeWords() {
  const name = (CONFIG.avatarName || '').toLowerCase().trim();
  const variants = [name, name.replace(/[aeiou]$/i, '')];  // es. "sofia" e "sofi"
  const prefixes = ['ciao', 'hey', 'ok'];
  const words = new Set();
  for (const p of prefixes) {
    words.add(p);
    for (const v of variants) if (v) words.add(`${p} ${v}`);
  }
  if (name) words.add(name);
  return [...words];
}

function startWakeWord() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('[WakeWord] Web Speech API non supportata'); return; }

  const rec = new SR();
  rec.lang = 'it-IT';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 3;
  state.wakeRecognition = rec;

  const wakeWords = _buildWakeWords();

  rec.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      for (let j = 0; j < e.results[i].length; j++) {
        const text = e.results[i][j].transcript.toLowerCase().trim();
        const textWords = text.split(/\s+/);
        const wakeMatch = wakeWords.some(w => {
          const ww = w.split(/\s+/);
          return textWords.some((_, k) => ww.every((p, j) => textWords[k + j] === p));
        });
        if (wakeMatch) {
          const wordCount = text.trim().split(/\s+/).length;
          if (state.mode === 'idle') {
            stopWakeWord();
            const idleOverlay = document.getElementById('idle-overlay');
            if (idleOverlay) idleOverlay.click();
          } else if (state.mode === 'listening' && CONFIG.wakeWordAlwaysRequired) {
            stopWakeWord();
            state.wakeActivated = true;
            setMode('recording');
            clearTimeout(state._wakeTimeout);
            state._wakeTimeout = setTimeout(() => {
              if (state.mode === 'recording' && state.wakeActivated) {
                state.wakeActivated = false;
                setMode('listening');
                startWakeWord();
              }
            }, 3000);
          }
          return;
        }
      }
    }
  };

  rec.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.warn('[WakeWord] errore:', e.error);
  };

  rec.onend = () => {
    const shouldRestart = state.wakeRecognition &&
      (state.mode === 'idle' ||
       (CONFIG.wakeWordAlwaysRequired && (state.mode === 'listening' || state.mode === 'speaking')));
    if (shouldRestart) {
      setTimeout(() => { try { rec.start(); } catch(e) {} }, 300);
    }
  };

  try { rec.start(); } catch(e) { console.warn('[WakeWord] start fallito:', e.message); }
}

function stopWakeWord() {
  if (!state.wakeRecognition) return;
  try { state.wakeRecognition.stop(); } catch(_) {}
  state.wakeRecognition = null;
}

  const group = new THREE.Group();
  const skin  = new THREE.MeshPhongMaterial({ color: 0xfdd8b0, shininess: 30 });

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.25, 0.3, 0.9, 32),
    new THREE.MeshPhongMaterial({ color: 0x6c63ff, shininess: 60 })
  );
  body.position.y = 0.7;
  group.add(body);

  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.11, 0.2, 16), skin);
  neck.position.y = 1.2;
  group.add(neck);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), skin);
  head.position.y = 1.5;
  group.add(head);

  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.235, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.55),
    new THREE.MeshPhongMaterial({ color: 0x3d1c02, side: THREE.DoubleSide })
  );
  hair.position.y = 1.5;
  hair.rotation.x = -0.1;
  group.add(hair);

  const eyeMat   = new THREE.MeshPhongMaterial({ color: 0x222222 });
  const pupilMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
  [-0.08, 0.08].forEach(x => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), eyeMat);
    eye.position.set(x, 1.52, 0.2);
    group.add(eye);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), pupilMat);
    pupil.position.set(x, 1.52, 0.215);
    group.add(pupil);
  });

  const mouthGroup = new THREE.Group();
  mouthGroup.position.set(0, 1.43, 0.19);
  group.add(mouthGroup);
  group.userData.mouth = mouthGroup;

  const lipMat = new THREE.MeshPhongMaterial({ color: 0xc8706a });
  const upperLip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.015, 0.02), lipMat);
  upperLip.position.set(0, 0.01, 0);
  mouthGroup.add(upperLip);

  const lowerLip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.015, 0.02), lipMat);
  lowerLip.position.set(0, -0.01, 0);
  lowerLip.name = 'lowerLip';
  mouthGroup.add(lowerLip);

  scene.add(group);
  state.avatar = group;
  startRenderLoop();
}

// ═══════════════════════════════════════════════════════════════════════════
//  ANIMAZIONE PROCEDURALE + LIP SYNC
// ═══════════════════════════════════════════════════════════════════════════

// Stato animazione
const anim = {
  breathPhase: 0,
  floatPhase:  0,
  wobblePhase: 0,

  // Rotazione modello intero (gesture globali)
  cur: { rx: 0, ry: 0, rz: 0 },
  tgt: { rx: 0, ry: 0, rz: 0 },

  // Rotazione head bone (gesture testa)
  head: { rx: 0, ry: 0, rz: 0 },
  headTgt: { rx: 0, ry: 0, rz: 0 },

  // Timing gesture
  nextGestureIn:  3000,
  lastGestureAt:  0,
  gestureReturnAt: 0,

  // Lip sync (rotazione X head = apertura bocca)
  lipTarget:  0,
  lipCurrent: 0,

  baseY: 0,
  bones: {},        // popolato dopo caricamento GLB
  morphMesh:   null, // mesh con morph target jawOpen
  morphJawIdx: -1,   // indice morph target
};

// Gestures testa: [rx, ry, rz, durata ms]
const GESTURES = [
  [ 0.12,  0.00,  0.00, 500],   // annuisce
  [-0.08,  0.00,  0.00, 450],   // guarda su
  [ 0.05,  0.25,  0.00, 650],   // guarda sinistra
  [ 0.05, -0.25,  0.00, 650],   // guarda destra
  [ 0.08,  0.15,  0.06, 550],   // inclina sinistra
  [ 0.08, -0.15, -0.06, 550],   // inclina destra
  [ 0.00,  0.00,  0.00, 400],   // neutro (pausa)
];

function triggerRandomGesture() {
  const g = GESTURES[Math.floor(Math.random() * GESTURES.length)];
  anim.headTgt = { rx: g[0], ry: g[1], rz: g[2] };
  anim.gestureReturnAt = Date.now() + g[3];
}

function startRenderLoop() {
  const clock = new THREE.Clock();

  // Salva Y base del modello dopo il posizionamento
  if (state.avatar) anim.baseY = state.avatar.position.y;

  (function tick() {
    requestAnimationFrame(tick);
    const delta = clock.getDelta();
    const now   = Date.now();

    if (state.avatar) {
      anim.breathPhase += delta * 0.35;
      anim.floatPhase  += delta * 0.55;
      anim.wobblePhase += delta * 1.8;

      // ── Animazioni idle ───────────────────────────────
      const breath = Math.sin(anim.breathPhase) * 0.006;
      const float  = Math.sin(anim.floatPhase)  * 0.035;

      // ── Gesture random ────────────────────────────────
      if (now - anim.lastGestureAt > anim.nextGestureIn) {
        anim.lastGestureAt = now;
        anim.nextGestureIn = 3500 + Math.random() * 4500;
        triggerRandomGesture();
      }
      if (now > anim.gestureReturnAt) {
        anim.headTgt = { rx: 0, ry: 0, rz: 0 };
      }

      // Interpolazione smooth testa
      const lerp = 1 - Math.pow(0.04, delta);
      anim.head.rx += (anim.headTgt.rx - anim.head.rx) * lerp;
      anim.head.ry += (anim.headTgt.ry - anim.head.ry) * lerp;
      anim.head.rz += (anim.headTgt.rz - anim.head.rz) * lerp;

      // ── Lip sync ──────────────────────────────────────
      anim.lipCurrent += (anim.lipTarget - anim.lipCurrent) * 0.25;

      state.avatar.position.y = anim.baseY;
    }

    // Controllo range animazione (disabilitato durante scrub admin)
    if (state.mainAction && !state._isScrubbing && !state._adminScrubbing && state._fullClip) {
      const dur = state._fullClip.duration;

      // Preview loop dall'admin ha priorità
      const raw = state._isPreviewLooping && state._previewRange
        ? state._previewRange
        : state.mode === 'speaking'
          ? { start: ANIM_RANGE.speechStart, end: ANIM_RANGE.speechEnd }
          : { start: ANIM_RANGE.idleStart,   end: ANIM_RANGE.idleEnd };

      const r = { start: Math.min(raw.start, dur), end: Math.min(raw.end, dur) };

      if (r.start < r.end) {
        const t = state.mainAction.time;
        if (CONFIG.animPingPong) {
          if (state.mainAction.timeScale >= 0 && t >= r.end) {
            state.mainAction.timeScale = -1;
            state.mainAction.time = r.end - 0.001;
          } else if (state.mainAction.timeScale < 0 && t <= r.start) {
            state.mainAction.timeScale = 1;
            state.mainAction.time = r.start + 0.001;
          }
        } else {
          state.mainAction.timeScale = 1;
          if (t < r.start || t >= r.end) state.mainAction.time = r.start;
        }
      }
    }

    // Mixer principale (saltato durante scrub)
    if (state.mixer && !state._isScrubbing) state.mixer.update(delta);
    // Mixer scrub
    if (state._scrubMixer && state._isScrubbing && _scrubPlaying) state._scrubMixer.update(delta);

    if (!state._isScrubbing && state.avatar) {
      const talking = state.mode === 'speaking' ? anim.lipCurrent : 0;

      // ── Lip sync: priorità jaw bone → morph target → head rotation ──
      if (anim.bones.jaw) {
        // Opzione A: jaw bone — rotazione X
        anim.bones.jaw.rotation.x = talking * 0.35 * Math.abs(Math.sin(anim.wobblePhase));
      } else if (anim.morphMesh) {
        // Opzione B: morph target jawOpen
        anim.morphMesh.morphTargetInfluences[anim.morphJawIdx] =
          talking * Math.abs(Math.sin(anim.wobblePhase));
      } else if (anim.bones.head) {
        // Fallback: rotazione testa
        const lipRot = talking * 0.22 * Math.abs(Math.sin(anim.wobblePhase));
        anim.bones.head.rotation.x += anim.head.rx + lipRot;
        anim.bones.head.rotation.y += anim.head.ry;
        anim.bones.head.rotation.z += anim.head.rz;
      }

      // Gesture testa (solo se non gestita dal lip sync con head)
      if (anim.bones.head && (anim.bones.jaw || anim.morphMesh)) {
        anim.bones.head.rotation.x += anim.head.rx;
        anim.bones.head.rotation.y += anim.head.ry;
        anim.bones.head.rotation.z += anim.head.rz;
      }

      // Respiro spine
      if (anim.bones.spine) {
        const breath = Math.sin(anim.breathPhase) * 0.006;
        anim.bones.spine.rotation.x += breath * 2;
      }
    }

    // Resize dinamico
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    renderer.render(scene, camera);
    // Nasconde lo spinner al primo frame effettivamente renderizzato
    const loader = document.getElementById('avatar-loader');
    if (loader && !loader.classList.contains('hidden')) {
      loader.classList.add('hidden');
    }
  })();
}

// ── Forza una gesture dall'esterno (es. quando parla) ────────────────────
function triggerTalkingGesture() {
  const talking = [
    [0.05,  0.08, 0.00, 400],
    [0.08,  0.00, 0.02, 500],
    [0.04, -0.10, 0.00, 450],
  ];
  const g = talking[Math.floor(Math.random() * talking.length)];
  anim.headTgt = { rx: g[0], ry: g[1], rz: g[2] };
  anim.gestureReturnAt = Date.now() + g[3];
}

// ═══════════════════════════════════════════════════════════════════════════
//  LIP SYNC — guida anim.lipTarget tramite audio
// ═══════════════════════════════════════════════════════════════════════════
let _lipAudioCtx = null;
let _iosAudioSrc = null;
const _isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

function _b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

async function playTTSAudio(ttsData) {
  if (_isIOS) {
    // Su iOS: decodifica e riproduce via AudioContext (sbloccato in wakeUp durante il gesto)
    try {
      if (_lipAudioCtx?.state === 'suspended') await _lipAudioCtx.resume().catch(() => {});
      const buf = await _lipAudioCtx.decodeAudioData(_b64ToArrayBuffer(ttsData.audio));
      if (_iosAudioSrc) { try { _iosAudioSrc.stop(); } catch(_){} }
      _iosAudioSrc = _lipAudioCtx.createBufferSource();
      _iosAudioSrc.buffer = buf;
      _iosAudioSrc.connect(_lipAudioCtx.destination);
      state.currentAudio = { pause: () => { try { _iosAudioSrc?.stop(); } catch(_){} }, _ios: true };
      await new Promise(resolve => {
        _iosAudioSrc.onended = resolve;
        _iosAudioSrc.start(0);
      });
    } catch (e) { console.warn('iOS audio error', e); }
    if (state.currentAudio?._ios) state.currentAudio = null;
    return;
  }
  // Desktop: HTMLAudioElement
  const audio = new Audio(`data:audio/mpeg;base64,${ttsData.audio}`);
  state.currentAudio = audio;
  if (_lipAudioCtx?.state === 'suspended') await _lipAudioCtx.resume().catch(() => {});
  await new Promise(resolve => {
    audio.addEventListener('ended', resolve, { once: true });
    audio.addEventListener('error', resolve, { once: true });
    startLipSync(audio, ttsData.alignment);
    audio.play().catch(resolve);
  });
  if (state.currentAudio === audio) state.currentAudio = null;
}

function startLipSync(audioEl, alignment) {
  // Con alignment ElevenLabs: vocali → bocca aperta
  if (alignment?.chars) {
    const { chars, char_start_times_seconds, char_durations_seconds } = alignment;
    (function update() {
      if (audioEl.paused || audioEl.ended) { anim.lipTarget = 0; return; }
      const t = audioEl.currentTime;
      for (let i = 0; i < chars.length; i++) {
        if (t >= char_start_times_seconds[i] && t < char_start_times_seconds[i] + char_durations_seconds[i]) {
          const isVowel = 'aeiouàèéìòù'.includes(chars[i].toLowerCase());
          anim.lipTarget = isVowel ? 0.75 + Math.random() * 0.25 : 0.12;
          // Gesture occasionale mentre parla
          if (Math.random() < 0.02) triggerTalkingGesture();
          break;
        }
      }
      requestAnimationFrame(update);
    })();
    return;
  }

  // Fallback: analisi frequenze vocali (300–3000 Hz)
  // Su iOS createMediaElementSource cattura l'audio e lo muta se il contesto è sospeso
  if (_isIOS) { startProceduralLipSync(); return; }
  if (!_lipAudioCtx) _lipAudioCtx = new AudioContext();
  if (_lipAudioCtx.state === 'suspended') { startProceduralLipSync(); return; }
  let source, analyser;
  try {
    source   = _lipAudioCtx.createMediaElementSource(audioEl);
    analyser = _lipAudioCtx.createAnalyser();
  } catch (_) { startProceduralLipSync(); return; }
  analyser.fftSize = 256;
  source.connect(analyser);
  analyser.connect(_lipAudioCtx.destination);
  const data = new Uint8Array(analyser.frequencyBinCount);

  (function update() {
    if (audioEl.paused || audioEl.ended) { anim.lipTarget = 0; return; }
    analyser.getByteFrequencyData(data);
    const s = Math.floor(300  / (_lipAudioCtx.sampleRate / analyser.fftSize));
    const e = Math.floor(3000 / (_lipAudioCtx.sampleRate / analyser.fftSize));
    let sum = 0;
    for (let i = s; i < e; i++) sum += data[i];
    anim.lipTarget = Math.min((sum / (e - s)) / 100, 1);
    if (Math.random() < 0.015) triggerTalkingGesture();
    requestAnimationFrame(update);
  })();
}

let _idleTimer = null;

function resetIdleTimer() {
  if (CONFIG.idleDisabled) return;
  clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    document.getElementById('idle-overlay').classList.remove('hidden');
    setControlsVisible(false);
    document.getElementById('chat-history').innerHTML = '';
    setMode('idle');
    state.vad?.pause();
    startWakeWord();
  }, CONFIG.idleTimeout);
}

function stripMarkdown(text) {
  return text
    .replace(/#{1,6}\s*/g, '')           // titoli
    .replace(/\*\*(.+?)\*\*/g, '$1')     // grassetto
    .replace(/\*(.+?)\*/g, '$1')         // corsivo
    .replace(/__(.+?)__/g, '$1')
    .replace(/_(.+?)_/g, '$1')
    .replace(/`{1,3}[^`]*`{1,3}/g, '')  // codice
    .replace(/\[(.+?)\]\(.+?\)/g, '$1') // link
    .replace(/^\s*[-*+]\s+/gm, '')      // liste
    .replace(/^\s*\d+\.\s+/gm, '')      // liste numerate
    .replace(/\n{2,}/g, ' ')
    .trim();
}

function addToHistory(role, text) {
  const history = document.getElementById('chat-history');
  const wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
  wrap.style.marginBottom = '10px';

  const bubble = document.createElement('div');
  bubble.className = role === 'user' ? 'transcript-bubble' : 'response-bubble-hist';

  if (role !== 'user') {
    const lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = CONFIG.avatarName?.toUpperCase() || 'SOFIA';
    bubble.appendChild(lbl);
  }
  const content = document.createElement('div');
  content.className = 'bubble-content';
  if (role === 'user') {
    content.textContent = text;
  } else {
    content.innerHTML = marked.parse(text);
  }
  bubble.appendChild(content);
  wrap.appendChild(bubble);
  history.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

async function processUserInput(text) {
  if (!text?.trim()) return;
  state.vad?.pause();

  // Nasconde il bubble di benvenuto al primo messaggio
  document.getElementById('response-bubble').style.display = 'none';

  // Aggiunge messaggio utente alla cronologia
  addToHistory('user', text);

  setMode('thinking');
  document.getElementById('typing').classList.add('visible');
  _userScrolledUp = false;
  scrollToBottom();

  try {
    // ── 1. Claude ────────────────────────────────────────────────────────
    const chatRes = await fetch(`${CONFIG.serverUrl}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: state.sessionId, avatarId: CONFIG.avatarId }),
    });
    const chatData = await chatRes.json();
    if (!chatRes.ok) throw new Error(chatData.error);

    state.sessionId = chatData.sessionId;

    // ── 2. TTS ───────────────────────────────────────────────────────────
    const ttsRes = await fetch(`${CONFIG.serverUrl}/api/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: chatData.reply, avatarId: CONFIG.avatarId }),
    });

    // Mostra risposta nella cronologia quando ElevenLabs ha risposto
    document.getElementById('typing').classList.remove('visible');
    addToHistory('avatar', chatData.reply);
    setMode('speaking');
    state.vad?.resume();

    if (ttsRes.ok) {
      const ttsData = await ttsRes.json();
      stopCurrentAudio();
      if (CONFIG.audioEnabled) {
        startProceduralLipSync();
        await playTTSAudio(ttsData);
      }
    } else {
      const ttsErr = await ttsRes.json().catch(() => ({}));
      if (ttsErr.error === 'quota_exceeded') {
        addToHistory('avatar', '⚠️ Crediti vocali esauriti. Ricarica il piano ElevenLabs per ripristinare l\'audio.');
      }
    }

  } catch (err) {
    document.getElementById('typing').classList.remove('visible');
    addToHistory('avatar', `⚠️ ${err.message}`);
  } finally {
    stopProceduralLipSync();
    anim.lipTarget = 0;
    if (state.mode !== 'recording' && state.mode !== 'thinking') {
      setMode('listening');
    }
    state.vad?.resume();
    state.wakeActivated = false;
    state.bargeIn = false;
    if (CONFIG.wakeWordAlwaysRequired) startWakeWord();
    resetIdleTimer();
  }
}

// Lip sync procedurale durante lo streaming (senza audio)
let _proceduralLipInterval = null;
function startProceduralLipSync() {
  _proceduralLipInterval = setInterval(() => {
    anim.lipTarget = 0.3 + Math.random() * 0.7;
  }, 120);
}
function stopProceduralLipSync() {
  clearInterval(_proceduralLipInterval);
  _proceduralLipInterval = null;
  anim.lipTarget = 0;
}

let _userScrolledUp = false;

function scrollToBottom() {
  const area = document.getElementById('response-area');
  if (!_userScrolledUp) {
    area.scrollTop = area.scrollHeight;
  } else {
    document.getElementById('scroll-hint').style.display = 'block';
  }
}

function forceScrollToBottom() {
  const area = document.getElementById('response-area');
  _userScrolledUp = false;
  document.getElementById('scroll-hint').style.display = 'none';
  area.scrollTop = area.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
  const area = document.getElementById('response-area');
  area.addEventListener('scroll', () => {
    const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;
    _userScrolledUp = !atBottom;
    if (atBottom) document.getElementById('scroll-hint').style.display = 'none';
  });
  updateMicBtn();
  updateAudioBtn();
});

// ═══════════════════════════════════════════════════════════════════════════
//  INPUT TESTO (fallback)
// ═══════════════════════════════════════════════════════════════════════════
async function sendText() {
  const input = document.getElementById('text-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  await processUserInput(text);
}

document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

// ─── Ferma l'audio corrente e sblocca la Promise ─────────────────────────────
function stopCurrentAudio() {
  stopProceduralLipSync();
  anim.lipTarget = 0;
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio.dispatchEvent(new Event('ended')); // risolve la Promise naturalmente
    state.currentAudio = null;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  TRASCRIZIONE AUDIO (STT)
// ═══════════════════════════════════════════════════════════════════════════
async function transcribeAndProcess(blob) {
  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');
  if (CONFIG.avatarId) formData.append('avatarId', CONFIG.avatarId);

  try {
    const res  = await fetch(`${CONFIG.serverUrl}/api/stt`, { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    const transcript = data.transcript?.trim();
    if (transcript) {
      // Scarta trascrizioni composte solo da parole della wake word
      if (CONFIG.wakeWordEnabled || CONFIG.wakeWordAlwaysRequired) {
        const norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '');
        const t = norm(transcript.toLowerCase().replace(/[.,!?']/g, '').trim());
        const wakeWordParts = new Set(_buildWakeWords().flatMap(w => norm(w).split(/\s+/)));
        const contentWords = t.split(/\s+/).filter(w => w && !wakeWordParts.has(w));
        if (contentWords.length === 0) {
          // wakeActivated=true: la prossima frase parte senza richiedere di nuovo la wake word
          state.wakeActivated = true;
          state.vad?.resume();
          setMode('listening');
          if (CONFIG.wakeWordAlwaysRequired) startWakeWord();
          resetIdleTimer();
          clearTimeout(state._wakeTimeout);
          state._wakeTimeout = setTimeout(() => {
            if (state.mode === 'listening' && state.wakeActivated) {
              state.wakeActivated = false;
            }
          }, 4000);
          return;
        }
      }
      await processUserInput(transcript);
    } else {
      setMode('listening');
      state.vad?.resume();
      resetIdleTimer();
    }
  } catch (err) {
    document.getElementById('response-text').textContent = `⚠️ Errore trascrizione: ${err.message}`;
    document.getElementById('response-bubble').style.display = 'block';
    setMode('listening');
    state.vad?.resume();
    resetIdleTimer();
  }
}

//  WAKE UP / IDLE
// ═══════════════════════════════════════════════════════════════════════════
// defaultRight: posizione right di default (px) per separare i due bottoni
function applyIconLayout(btnId, imgId, size, x, y, defaultRight, defaultTop=16) {
  const btn = document.getElementById(btnId);
  const img = document.getElementById(imgId);
  if (!btn) return;
  btn.style.width  = size + 'px';
  btn.style.height = size + 'px';
  // posizioni in vw/vh (calibrate su 1080×1920)
  btn.style.top    = ((defaultTop + y) / 1920 * 100) + 'vh';
  btn.style.left   = '';
  btn.style.right  = ((defaultRight - x) / 1080 * 100) + 'vw';
  if (img) {
    const imgSize = Math.round(size * 0.64);
    img.style.width  = imgSize + 'px';
    img.style.height = imgSize + 'px';
  }
}

function _applyDisabledIcon(imgId, path, fallbackId) {
  const img = document.getElementById(imgId);
  if (!img) return;
  if (path) {
    img.src = '/' + path + '?t=' + (CONFIG._iconTs || '');
    img.style.display = 'block';
    const fb = document.getElementById(fallbackId);
    if (fb) fb.style.display = 'none';

async function toggleMic() {
  CONFIG.micEnabled = !CONFIG.micEnabled;
  updateMicBtn();
  if (CONFIG.micEnabled) {
    if (state.mode !== 'idle') await _startVad();
  } else {
    const vad = state.vad;
    state.vad = null;
    if (state.mode === 'recording') {
      // Stava registrando: aspetta che il blob venga consegnato all'AI prima di fermare
      const origOnSpeechEnd = vad.onSpeechEnd;
      vad.onSpeechEnd = async blob => {
        await origOnSpeechEnd(blob);
        vad.stop();
      };
      vad._forceStop();
    } else {
      vad?.stop();
    }
  }
}

async function _startVad() {
  try {
    state.vad = new VAD({
      threshold:         CONFIG.vadThreshold,
      silenceDuration:   CONFIG.vadSilenceDuration,
      minSpeechDuration: CONFIG.vadMinSpeechDuration,
      onVolume:    rms => updateVadVisualizer(rms),
      onSpeechStart: () => {
        clearTimeout(state._wakeTimeout);
        if (state.mode === 'listening') {
          if (CONFIG.wakeWordAlwaysRequired && !state.wakeActivated) return;
          state.wakeActivated = false;
          setMode('recording');
        } else if (state.mode === 'speaking') {
          // Barge-in: interrompe sempre, senza richiedere wake word
          state.bargeIn = true;
          stopCurrentAudio();
          setMode('recording');
        }
      },
      onSpeechEnd: async blob => {
        if (state.mode === 'recording') {
          if (CONFIG.wakeWordAlwaysRequired && !state.wakeActivated && !state.bargeIn) {
            setMode('listening');
            return;
          }
          if (blob.size < 3000) {
            state.wakeActivated = false;
            state.bargeIn = false;
            setMode('listening');
            if (CONFIG.wakeWordAlwaysRequired) startWakeWord();
            return;
          }
          state.wakeActivated = false;
          state.bargeIn = false;
          setMode('thinking');
          await transcribeAndProcess(blob);
        }
      },
    });
    await state.vad.start();
    // Se il mic è stato spento mentre getUserMedia era in attesa, ferma subito
    if (!CONFIG.micEnabled) { state.vad.stop(); state.vad = null; }
  } catch (err) {
    console.warn('⚠️ Mic non disponibile:', err);
  }
}

function setControlsVisible(visible) {
  document.body.classList.toggle('idle-hidden', !visible);
}

async function wakeUp() {
  stopWakeWord();
  document.getElementById('idle-overlay').classList.add('hidden');
  setControlsVisible(true);
  setMode('listening');
  if (CONFIG.wakeWordAlwaysRequired) startWakeWord();
  resetIdleTimer();

  // Sblocca AudioContext su iOS durante il gesto utente (obbligatorio per resume())
  try {
    if (!_lipAudioCtx) _lipAudioCtx = new AudioContext();
    if (_lipAudioCtx.state === 'suspended') await _lipAudioCtx.resume();
    // Buffer silenzioso per confermare sblocco
    const buf = _lipAudioCtx.createBuffer(1, 1, 22050);
    const src = _lipAudioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(_lipAudioCtx.destination);
    src.start(0);
  } catch (_) {}

  // Prima visita: mostra benvenuto (piccolo delay per garantire repaint pannello)
  setTimeout(() => addToHistory('avatar', `Ciao! Sono ${CONFIG.avatarName}. Come posso aiutarti?`), 50);

  // Se wake word attiva, forza il microfono abilitato
  if (CONFIG.wakeWordEnabled && !CONFIG.micEnabled) {
    CONFIG.micEnabled = true;
    updateMicBtn();
  }

  // Avvia VAD solo se microfono abilitato
  if (!CONFIG.micEnabled) return;

  if (!state.vad) await _startVad();
  else state.vad.resume();
}

function toggleSettings() {

function exitScrubMode() {
  if (!state._isScrubbing) return;
  state._isScrubbing = false;
  if (_scrubPlaying) {
    clearInterval(_scrubInterval);
    _scrubPlaying = false;
    document.getElementById('scrub-play-btn').textContent = '▶ Play';
  }
  // Distruggi mixer scrub — verrà ricreato al prossimo scrub
  if (state._scrubMixer) {
    state._scrubMixer.stopAllAction();
    state._scrubMixer = null;
    state._scrubAction = null;
  }
  // Ripristina azione principale
  if (state.mainAction) {
    state.mainAction.paused    = false;
    state.mainAction.weight    = 1;
    state.mainAction.timeScale = 1;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  SCRUBBER ANIMAZIONE
// ═══════════════════════════════════════════════════════════════════════════
const _range = { start: null, end: null };
let _scrubPlaying = false;
let _scrubInterval = null;

// Range animazione
const ANIM_RANGE = {
  idleStart:   0.0,
  idleEnd:     2.65,
  speechStart: 2.65,
  speechEnd:   9.04,
};

function initScrubber() {
  if (!state._fullClip) return;
  const dur = state._fullClip.duration;

  // Scrubber esplorazione
  const scrubber = document.getElementById('anim-scrubber');
  scrubber.max   = dur;
  scrubber.step  = 0.01;
  scrubber.value = 0;
  document.getElementById('val-anim-dur').textContent  = dur.toFixed(2);
  document.getElementById('val-anim-time').textContent = '0.00';

  // Slider range — max = durata clip
  ['speech-start-slider','speech-end-slider','rest-time-slider'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.max = dur.toFixed(2);
  });
}

function updateAnimRange(key, value) {
  const v = parseFloat(value);
  ANIM_RANGE[key] = v;
  const labelMap = {
    idleStart: 'val-idle-start', idleEnd: 'val-idle-end',
    speechStart: 'val-speech-start', speechEnd: 'val-speech-end',
  };
  document.getElementById(labelMap[key]).textContent = v.toFixed(2);
}

function applyAnimRange() {
  const { idleStart, idleEnd, speechStart, speechEnd } = ANIM_RANGE;
  if (idleStart >= idleEnd) {
    document.getElementById('anim-range-info').textContent = '⚠️ Idle Start deve essere < Idle End'; return;
  }
  if (speechStart >= speechEnd) {
    document.getElementById('anim-range-info').textContent = '⚠️ Speech Start deve essere < Speech End'; return;
  }
  // I range vengono applicati direttamente nel render loop — nessun subclip
  document.getElementById('anim-range-info').textContent =
    `✅ Idle ${idleStart.toFixed(2)}→${idleEnd.toFixed(2)}s | Speech ${speechStart.toFixed(2)}→${speechEnd.toFixed(2)}s`;
}

function scrubAnimation(value) {
  if (!state._fullClip || !state.avatar) return;
  const t = parseFloat(value);

  // Mixer dedicato allo scrub — creato una volta sola
  if (!state._scrubMixer) {
    state._scrubMixer  = new THREE.AnimationMixer(state.avatar);
    state._scrubAction = state._scrubMixer.clipAction(state._fullClip);
    state._scrubAction.setLoop(THREE.LoopOnce, 1);
    state._scrubAction.clampWhenFinished = true;
    state._scrubAction.play();
  }

  // Pausa il mixer principale
  if (!state._isScrubbing) {
    if (state.mainAction) state.mainAction.paused = true;
    state._isScrubbing = true;
  }

  // Porta il mixer scrub al frame desiderato
  state._scrubMixer.setTime(t);
  document.getElementById('val-anim-time').textContent = t.toFixed(2);
}

function toggleScrubPlay() {
  const btn = document.getElementById('scrub-play-btn');

  if (_scrubPlaying) {
    // Stop — ripristina animazioni normali
    clearInterval(_scrubInterval);
    _scrubPlaying = false;
    btn.textContent = '▶ Play';
    if (state._scrubAction) { state._scrubAction.weight = 0; state._scrubAction.timeScale = 0; }
    if (state.mainAction) { state.mainAction.weight = 1; state.mainAction.timeScale = 1; }
    state._isScrubbing = false;
    return;
  }

  // Verifica range
  if (_range.start === null || _range.end === null) {
    document.getElementById('anim-range-info').textContent = '⚠️ Segna prima Start e End';
    return;
  }
  if (_range.start >= _range.end) {
    document.getElementById('anim-range-info').textContent = '⚠️ Start deve essere < End';
    return;
  }

  // Inizializza scrub mixer se necessario
  if (!state._scrubMixer && state._fullClip && state.avatar) {
    state._scrubMixer  = new THREE.AnimationMixer(state.avatar);
    state._scrubAction = state._scrubMixer.clipAction(state._fullClip);
    state._scrubAction.setLoop(THREE.LoopRepeat, Infinity);
    state._scrubAction.play();
  }

  // Parti dall'inizio del range
  state._scrubMixer?.setTime(_range.start);

  // Pausa il mixer principale
  if (state.mainAction) state.mainAction.paused = true;
  state._isScrubbing = true;

  _scrubPlaying = true;
  btn.textContent = '⏸ Stop';

  const scrubber = document.getElementById('anim-scrubber');
  let _scrubTime = _range.start;
  _scrubInterval = setInterval(() => {
    _scrubTime += 0.033;
    if (_scrubTime >= _range.end) _scrubTime = _range.start;
    state._scrubMixer?.setTime(_scrubTime);
    scrubber.value = _scrubTime;
    document.getElementById('val-anim-time').textContent = _scrubTime.toFixed(2);
  }, 33);
}

function markRange(type) {
  const scrubber = document.getElementById('anim-scrubber');
  const t = parseFloat(scrubber.value);
  _range[type] = parseFloat(t.toFixed(3));
  document.getElementById(type === 'start' ? 'lbl-start' : 'lbl-end').textContent = t.toFixed(3);
}

function applyRangeTo(target) {
  if (_range.start === null || _range.end === null) {
    document.getElementById('anim-range-info').textContent = '⚠️ Segna prima Start e End';
    return;
  }
  const s = _range.start, e = _range.end;
  if (target === 'idle') {
    ANIM_RANGE.idleStart = s; ANIM_RANGE.idleEnd = e;
    document.getElementById('idle-start-slider').value     = s;
    document.getElementById('idle-end-slider').value       = e;
    document.getElementById('val-idle-start').textContent  = s.toFixed(2);
    document.getElementById('val-idle-end').textContent    = e.toFixed(2);
  } else {
    ANIM_RANGE.speechStart = s; ANIM_RANGE.speechEnd = e;
    document.getElementById('speech-start-slider').value    = s;
    document.getElementById('speech-end-slider').value      = e;
    document.getElementById('val-speech-start').textContent = s.toFixed(2);
    document.getElementById('val-speech-end').textContent   = e.toFixed(2);
  }
  // Esci dallo scrub ed applica i subclip
  exitScrubMode();
  applyAnimRange();
  document.getElementById('anim-range-info').textContent =
    `✅ ${target === 'idle' ? '💤 Idle' : '🗣 Speech'}: ${s.toFixed(2)}→${e.toFixed(2)}s applicato`;
}

function copyRangeConfig() {
  if (_range.start === null || _range.end === null) {
    document.getElementById('anim-range-info').textContent = '⚠️ Segna prima Start e End';
    return;
  }
  const txt = `// Range animazione selezionato\nconst subClip = THREE.AnimationUtils.subclip(\n  gltf.animations[0], 'nome', ${_range.start}, ${_range.end}\n);`;
  navigator.clipboard.writeText(txt).then(() => {
    const el = document.getElementById('anim-range-info');
    const prev = el.textContent;
    el.textContent = '✅ Copiato!';
    setTimeout(() => { el.textContent = prev; }, 2000);
  });
}

async function uploadFbx(file) {
  if (!file || !file.name.toLowerCase().endsWith('.fbx')) {
    setFbxStatus('error', '⚠️ Seleziona un file .fbx');
    return;
  }
  setFbxStatus('loading', `⏳ Conversione di ${file.name}...`);

  const form = new FormData();
  form.append('model', file);

  try {
    const res  = await fetch('/api/upload-avatar', { method: 'POST', body: form });

    if (!res.ok) throw new Error(data.error);

    setFbxStatus('ok', '✅ Modello caricato! Ricarico...');

    setFbxStatus('error', '❌ ' + err.message);

function updateAvatarParam(key, value, labelId, liveUpdate) {
  const v = parseFloat(value);
  CONFIG[key] = v;
  document.getElementById(labelId).textContent = v.toFixed(2);
  if (!state.avatar) return;

  if (key === 'avatarScale') {
    // Ricalcola scala
    const box = new THREE.Box3().setFromObject(state.avatar);
    const size = box.getSize(new THREE.Vector3());
    const panelH = document.getElementById('avatar-panel').clientHeight || window.innerHeight;
    const visibleH = 2 * Math.tan((45 / 2) * Math.PI / 180) * camera.position.z;
    const scale = (visibleH * v) / (size.y / state.avatar.scale.x);
    state.avatar.scale.setScalar(scale);
    anim.baseY = state.avatar.position.y;
  } else if (key === 'avatarOffsetX') {
    state.avatar.position.x = v;
  } else if (key === 'avatarOffsetY') {
    state.avatar.position.y = v;
    anim.baseY = v;
  } else if (key === 'avatarRotY') {
    state.avatar.rotation.y = v;
  }
}

function updateCameraParam(key, value, labelId) {
  const v = parseFloat(value);
  CONFIG[key] = v;

  if (key === 'cameraZ') camera.position.z = v;
  if (key === 'cameraY') camera.position.y = v;
  camera.lookAt(0, CONFIG.cameraLookAtY, 0);
}

// ═══════════════════════════════════════════════════════════════════════════
//  CARICAMENTO MODELLO GLB
// ═══════════════════════════════════════════════════════════════════════════
function loadGLBAvatar(url) {
  const loader = new THREE.GLTFLoader();
  try {
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('/lib/draco/');
    loader.setDRACOLoader(draco);
  } catch(_) {}

  // Richiesta HEAD per ottenere dimensione file e calcolare % reale
  let _glbTotal = 0;
  fetch(url, { method: 'HEAD' }).then(r => {
    _glbTotal = parseInt(r.headers.get('content-length') || '0');
  }).catch(() => {});

  loader.load(
    url,
    gltf => {
      const model = gltf.scene;

      // Scala il modello per riempire il canvas
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // Usa l'altezza del pannello avatar come riferimento
      const panelH = document.getElementById('avatar-panel').clientHeight || window.innerHeight;
      const panelW = document.getElementById('avatar-panel').clientWidth  || window.innerWidth * 0.6;

      // Converti pixel in unità world: la camera vede ~2.4 unità in altezza a distanza 3
      const visibleH = 2 * Math.tan((45 / 2) * Math.PI / 180) * camera.position.z;
      const visibleW = visibleH * (panelW / panelH);
      const targetH  = visibleH * CONFIG.avatarScale;
      const scale    = targetH / size.y;

      console.log('[Avatar load] size:', size, '| box.min.y:', box.min.y.toFixed(4), '| scale:', scale.toFixed(6), '| visibleH:', visibleH.toFixed(3), '| targetH:', targetH.toFixed(3));

      model.scale.setScalar(scale);
      model.position.x = -center.x * scale + CONFIG.avatarOffsetX;
      model.position.z = -center.z * scale + CONFIG.avatarOffsetZ;
      model.position.y = -box.min.y * scale + CONFIG.avatarOffsetY;
      model.rotation.y = CONFIG.avatarRotY;

      // Nascondi shadow plane / ground disc da conversione assimp
      model.traverse(o => {
        if (!o.isMesh) return;
        o.geometry.computeBoundingBox();
        const s = o.geometry.boundingBox.getSize(new THREE.Vector3());
        const flatRatio = s.y / Math.max(s.x, s.z, 0.0001);
        const isFlat = flatRatio < 0.02;
        const isShadowName = /shadow|ground|plane|circle|disc|floor/i.test(o.name);
        if (isFlat || isShadowName) {
          o.visible = false;
          console.log('[Avatar] nascosto mesh:', o.name, 'flatRatio:', flatRatio.toFixed(5));
        }
      });

      scene.add(model);
      state.avatar = model;
      anim.baseY = model.position.y;

      // Trova bone e morph target per lip sync
      model.traverse(o => {
        if (o.isBone) {
          const n = o.name.replace(/mixamorig\w*:/i, '').replace(/mixamorig\w*_/i, '');
          if (n === 'Head')  anim.bones.head  = o;
          if (n === 'Neck')  anim.bones.neck  = o;
          if (n === 'Spine') anim.bones.spine = o;
          if (n === 'Hips')  anim.bones.hips  = o;
          // Opzione A: jaw bone
          if (/^jaw$/i.test(n)) anim.bones.jaw = o;
        }
        // Opzione B: morph target jawOpen
        if (o.isMesh && o.morphTargetDictionary) {
          const idx = o.morphTargetDictionary['jawOpen'] ?? o.morphTargetDictionary['JawOpen'];
          if (idx !== undefined) {
            anim.morphMesh    = o;
            anim.morphJawIdx  = idx;
          }
        }
      });
      const lipSyncMethod = anim.bones.jaw ? 'jaw bone' : anim.morphMesh ? 'morph target jawOpen' : 'head rotation (fallback)';
      console.log('Bone trovati:', Object.keys(anim.bones), '| Lip sync:', lipSyncMethod);
      setTimeout(initScrubber, 100);

      if (gltf.animations?.length) {
        state.mixer     = new THREE.AnimationMixer(model);
        state._fullClip = gltf.animations[0];

        // Una sola azione sul clip completo — il range è controllato nel render loop
        state.mainAction = state.mixer.clipAction(state._fullClip);
        state.mainAction.setLoop(THREE.LoopRepeat, Infinity);
        state.mainAction.timeScale = 1;
        state.mainAction.time = ANIM_RANGE.idleStart;
        state.mainAction.play();

        // Comunica la durata del clip all'admin (se in preview)
        if (IS_PREVIEW) {
          window.parent.postMessage({ type: 'clipDuration', duration: state._fullClip.duration }, '*');
        }
      }

      startRenderLoop();
      console.log('✅ Modello GLB caricato:', url);
    },
    xhr => {
      const el = document.querySelector('#avatar-loader .loader-text');
      if (!el) return;
      const total = xhr.total || _glbTotal;
      if (total) {
        el.textContent = `Caricamento avatar… ${Math.round(xhr.loaded / total * 100)}%`;
      } else if (xhr.loaded > 0) {
        el.textContent = `Caricamento avatar… ${(xhr.loaded / 1048576).toFixed(1)} MB`;
      }
    },
    err => {
      document.getElementById('avatar-loader').classList.add('hidden');
      console.warn('⚠️ Modello GLB non caricato, uso placeholder:', err);
      createPlaceholderAvatar();
    }
  );
}

const AVATAR_ID   = location.pathname.split('/').pop();
const IS_PREVIEW  = location.pathname.startsWith('/preview/');

const sp = document.getElementById('settings-panel');
