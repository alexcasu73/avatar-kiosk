// ── postMessage: aggiornamenti real-time dall'admin ───────────────────────────

window.addEventListener('message', e => {
  const msg = e.data;
  if (!msg) return;



  if (msg.type === 'idleParam') {
    applyIdleParam(msg.key, msg.value);
    return;
  }

  if (msg.type === 'avatarParam') {
    if (msg.key === 'overlay_color' || msg.key === 'overlay_opacity' || msg.key === 'overlay_height') {
      if (msg.key === 'overlay_color')   CONFIG._overlayColor   = msg.value;
      if (msg.key === 'overlay_opacity') CONFIG._overlayOpacity = parseFloat(msg.value);
      if (msg.key === 'overlay_height') {
        CONFIG._overlayHeight = parseFloat(msg.value);
        document.documentElement.style.setProperty('--overlay-height', `${CONFIG._overlayHeight}vh`);
      }
      applyOverlay(CONFIG._overlayColor || '#0a0a0f', CONFIG._overlayOpacity ?? 0.75);
      return;
    }
    if (msg.key === 'wake_word_enabled') {
      CONFIG.wakeWordEnabled = !!parseInt(msg.value);
      if (!CONFIG.wakeWordEnabled) stopWakeWord();
      return;
    }
    if (msg.key === 'wake_word_always') {
      CONFIG.wakeWordAlwaysRequired = !!parseInt(msg.value);
      if (!CONFIG.wakeWordAlwaysRequired) { stopWakeWord(); state.wakeActivated = false; }
      else if (state.mode === 'listening') startWakeWord();
      return;
    }
    if (msg.key === 'idle_disabled') {
      CONFIG.idleDisabled = !!parseInt(msg.value);
      if (CONFIG.idleDisabled) {
        clearTimeout(_idleTimer);
        document.getElementById('idle-overlay').classList.add('hidden');
        setControlsVisible(true);
      } else {
        document.getElementById('idle-overlay').classList.remove('hidden');
        setControlsVisible(false);
      }
      return;
    }
    if (msg.key === 'bg_video') {
      const bgVid = document.getElementById('avatar-bg-video');
      if (msg.value) {
        bgVid.src = `/${msg.value}`; bgVid.style.display = 'block';
        document.getElementById('avatar-panel').style.background = 'transparent';
      } else {
        bgVid.src = ''; bgVid.style.display = 'none';
        document.getElementById('avatar-panel').style.background = '';
      }
    } else if (msg.key === 'background') {
      const color = msg.value;
      document.body.style.background = color;
      document.getElementById('avatar-panel').style.background =
        `radial-gradient(ellipse at 50% 60%, ${color}aa 0%, ${color} 70%)`;
    } else {
      const stringKeys = ['chat_align', 'model_file', 'mic_icon', 'mic_icon_disabled', 'audio_icon', 'audio_icon_disabled', 'chat_font', 'mic_wave_color', 'audio_wave_color', 'idle_font', 'idle_icon_img', 'theme', 'mic_bg_color', 'mic_disabled_color', 'mic_border_color', 'mic_border_disabled_color', 'audio_bg_color', 'audio_disabled_color', 'audio_border_color', 'audio_border_disabled_color'];
      const val = stringKeys.includes(msg.key) ? msg.value : parseFloat(msg.value);
      applyParamLive(msg.key, val);
    }
  }

  if (msg.type === 'playRange') {
    // Loop forzato in un range specifico per anteprima
    state._previewRange = msg.range === 'idle'
      ? { start: ANIM_RANGE.idleStart,   end: ANIM_RANGE.idleEnd }
      : { start: ANIM_RANGE.speechStart, end: ANIM_RANGE.speechEnd };
    if (state.mainAction) {
      state.mainAction.time = state._previewRange.start;
      state.mainAction.timeScale = 1;
    }
    state._isPreviewLooping = true;
  }

  if (msg.type === 'stopRange') {
    state._isPreviewLooping = false;
    state._previewRange     = null;
    state._adminScrubbing   = false;
    if (state.mainAction) state.mainAction.paused = false;
  }

  if (msg.type === 'playFrom') {
    const start = parseFloat(msg.time);
    const end   = msg.end != null ? parseFloat(msg.end) : null;
    state._adminScrubbing = false;
    if (state.mainAction) {
      state.mainAction.paused    = false;
      state.mainAction.time      = start;
      state.mainAction.timeScale = 1;
    }
    state._previewRange     = end !== null ? { start, end } : null;
    state._isPreviewLooping = end !== null;
  }

  if (msg.type === 'scrubTo') {
    if (state.mainAction && state.mixer) {
      state._isPreviewLooping = false;
      state._previewRange     = null;
      state._adminScrubbing   = true;
      state.mainAction.paused = true;
      state.mainAction.time   = parseFloat(msg.time);
      state.mixer.update(0);
    }
  }

  if (msg.type === 'resumePlay') {
    if (state.mainAction) state.mainAction.paused = false;
  }
});

function applyTheme(theme) {
  const valid = ['viola','rosso','arancio','verde','giallo','blu'];
  document.documentElement.setAttribute('data-theme', valid.includes(theme) ? theme : 'viola');
}


const IDLE_ID_MAP = { idle_icon: 'idle-icon-emoji', idle_title: 'idle-title', idle_subtitle: 'idle-subtitle', idle_hint: 'idle-hint' };
function applyIdleParam(key, value) {
  if (key === 'idle_timeout') {
    CONFIG.idleTimeout = parseInt(value) * 1000;
    resetIdleTimer();
    return;
  }
  if (key === 'idle_icon_img') {
    const img   = document.getElementById('idle-icon-img');
    const emoji = document.getElementById('idle-icon-emoji');
    if (!img) return;
    if (value) {
      img.src = `/${value}?t=${Date.now()}`;
      img.style.display = 'block';
      if (emoji) emoji.style.display = 'none';
    } else {
      img.style.display = 'none';
      if (emoji) emoji.style.display = '';
    }
    return;
  }
  if (key === 'idle_video') {
    const vid = document.getElementById('idle-overlay-video');
    const overlay = document.getElementById('idle-overlay');
    if (!vid) return;
    if (value) {
      vid.src = `/${value}`;
      vid.style.display = 'block';
    } else {
      vid.src = '';
      vid.style.display = 'none';
    }
    return;
  }
  if (key === 'idle_bg_image') {
    const overlay = document.getElementById('idle-overlay');
    if (!overlay) return;
    overlay.style.backgroundImage = value ? `url(/${value})` : '';
    return;
  }
  if (key === 'idle_bg_color' || key === 'idle_bg_color_alpha') {
    if (key === 'idle_bg_color_alpha') CONFIG._idleBgColorAlpha = parseFloat(value) ?? 1;
    if (key === 'idle_bg_color')       CONFIG._idleBgColor      = value || '';
    const overlay = document.getElementById('idle-overlay');
    if (!overlay) return;
    const col   = CONFIG._idleBgColor || '';
    const alpha = CONFIG._idleBgColorAlpha ?? 1;
    if (col) {
      const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
      overlay.style.backgroundColor = `rgba(${r},${g},${b},${alpha})`;
    } else {
      overlay.style.backgroundColor = '';
    }
    return;
  }
  if (key === 'idle_bg_opacity') {
    const overlay = document.getElementById('idle-overlay');
    if (!overlay) return;
    overlay.style.setProperty('--idle-bg-opacity', value != null ? parseFloat(value) : 1);
    return;
  }
  if (key === 'idle_font') {
    const overlay = document.getElementById('idle-overlay');
    if (!overlay) return;
    if (value) {
      const link = document.getElementById('_idle-font-link') || document.createElement('link');
      link.id = '_idle-font-link'; link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(value).replace(/%20/g,'+')}&display=swap`;
      document.head.appendChild(link);
      overlay.style.setProperty('--idle-font-family', `'${value}', sans-serif`);
    } else {
      overlay.style.setProperty('--idle-font-family', 'inherit');
    }
    return;
  }
  if (key === 'idle_font_size') {
    document.getElementById('idle-overlay')?.style.setProperty('--idle-font-size', parseFloat(value) + 'rem');
    return;
  }
  const el = document.getElementById(IDLE_ID_MAP[key]);
  if (el) el.textContent = value;
}

// ── WebSocket: aggiornamenti config dal server ────────────────────────────────
(function connectConfigWS() {
  if (IS_PREVIEW) return; // il preview usa già postMessage
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'config_update' && msg.avatarId === AVATAR_ID) {
        const d = msg.data;
        if (d.chat_bottom     !== undefined) applyParamLive('chat_bottom',     d.chat_bottom);
        if (d.chat_max_width  !== undefined) applyParamLive('chat_max_width',  d.chat_max_width);
        if (d.chat_align      !== undefined) applyParamLive('chat_align',      d.chat_align);
        if (d.chat_hide_input !== undefined) applyParamLive('chat_hide_input', d.chat_hide_input);
        if (d.chat_font       !== undefined) applyParamLive('chat_font',       d.chat_font);
        if (d.chat_font_size  !== undefined) applyParamLive('chat_font_size',  d.chat_font_size);
        if (d.show_controls    !== undefined) applyParamLive('show_controls',    d.show_controls);
        if (d.theme           !== undefined) applyTheme(d.theme);
        if (d.idle_disabled  !== undefined) {
          CONFIG.idleDisabled = !!d.idle_disabled;
          if (CONFIG.idleDisabled) {
            clearTimeout(_idleTimer);
            document.getElementById('idle-overlay').classList.add('hidden');
            setControlsVisible(true);
          }
        }
        if (d.idle_timeout   !== undefined) applyIdleParam('idle_timeout',  d.idle_timeout);
        if (d.idle_icon      !== undefined) applyIdleParam('idle_icon',     d.idle_icon);
        if (d.idle_title    !== undefined) applyIdleParam('idle_title',    d.idle_title    ?? '');
        if (d.idle_subtitle !== undefined) applyIdleParam('idle_subtitle', d.idle_subtitle);
        if (d.idle_hint       !== undefined) applyIdleParam('idle_hint',       d.idle_hint);
        if (d.idle_icon_img   !== undefined) applyIdleParam('idle_icon_img',   d.idle_icon_img);
        if (d.idle_video      !== undefined) applyIdleParam('idle_video',      d.idle_video);
        if (d.idle_bg_image   !== undefined) applyIdleParam('idle_bg_image',   d.idle_bg_image);
        if (d.idle_bg_color         !== undefined) applyIdleParam('idle_bg_color',       d.idle_bg_color);
        if (d.idle_bg_color_alpha   !== undefined) applyIdleParam('idle_bg_color_alpha', d.idle_bg_color_alpha);
        if (d.idle_bg_opacity !== undefined) applyIdleParam('idle_bg_opacity', d.idle_bg_opacity);
        if (d.idle_font       !== undefined) applyIdleParam('idle_font',       d.idle_font);
        if (d.idle_font_size  !== undefined) applyIdleParam('idle_font_size',  d.idle_font_size);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectConfigWS, 3000);
})();

function applyOverlay(color, opacity) {
  const el = document.getElementById('chat-overlay-layer');
  if (!el) return;
  const r = parseInt(color.slice(1,3), 16) ?? 10;
  const g = parseInt(color.slice(3,5), 16) ?? 10;
  const b = parseInt(color.slice(5,7), 16) ?? 15;
  // La sfumatura inizia tenendo conto anche del bottom offset del pannello
  const h         = CONFIG._overlayHeight ?? 65;
  const bottomPx  = CONFIG._chatBottom    ?? 0;
  const bottomPct = (bottomPx / window.innerHeight) * 100;
  const start = Math.max(0, 100 - h - bottomPct);     // bordo superiore reale
  const fade  = Math.min(start + 20, 100);             // sfumatura su 20% dell'altezza
  el.style.background = `linear-gradient(
    to bottom,
    rgba(${r},${g},${b},0) ${start}%,
    rgba(${r},${g},${b},${opacity}) ${fade}%,
    rgba(${r},${g},${b},${opacity}) 100%
  )`;
}

function applyParamLive(key, v) {
  const map = {
    avatar_scale:    () => { if (!state.avatar) return; const b=new THREE.Box3().setFromObject(state.avatar); const s=b.getSize(new THREE.Vector3()); const vis=2*Math.tan((45/2)*Math.PI/180)*camera.position.z; state.avatar.scale.setScalar((vis*v)/s.y*state.avatar.scale.x); anim.baseY=state.avatar.position.y; },
    avatar_offset_x: () => { if (!state.avatar) return; state.avatar.position.x = v; },
    avatar_offset_y: () => { if (!state.avatar) return; state.avatar.position.y = v; anim.baseY = v; },
    avatar_rot_y:    () => { if (!state.avatar) return; state.avatar.rotation.y = v; },
    camera_z:        () => { if (!state.avatar) return; camera.position.z = v; camera.lookAt(0, CONFIG.cameraLookAtY, 0); },
    camera_y:        () => { if (!state.avatar) return; camera.position.y = v; camera.lookAt(0, CONFIG.cameraLookAtY, 0); },
    camera_look_at_y:() => { if (!state.avatar) return; CONFIG.cameraLookAtY = v; camera.lookAt(0, v, 0); },
    anim_pingpong: () => { CONFIG.animPingPong = !!v; if (state.mainAction) state.mainAction.timeScale = 1; },
    idle_start:   () => { ANIM_RANGE.idleStart   = v; if (state._isPreviewLooping && state._previewRange?.start !== undefined && ANIM_RANGE.idleStart <= ANIM_RANGE.idleEnd) state._previewRange = { start: ANIM_RANGE.idleStart, end: ANIM_RANGE.idleEnd }; },
    idle_end:     () => { ANIM_RANGE.idleEnd     = v; if (state._isPreviewLooping && state._previewRange?.end   !== undefined && ANIM_RANGE.idleStart <= ANIM_RANGE.idleEnd) state._previewRange = { start: ANIM_RANGE.idleStart, end: ANIM_RANGE.idleEnd }; },
    speech_start: () => { ANIM_RANGE.speechStart = v; if (state._isPreviewLooping && state._previewRange?.start !== undefined && ANIM_RANGE.speechStart <= ANIM_RANGE.speechEnd) state._previewRange = { start: ANIM_RANGE.speechStart, end: ANIM_RANGE.speechEnd }; },
    speech_end:   () => { ANIM_RANGE.speechEnd   = v; if (state._isPreviewLooping && state._previewRange?.end   !== undefined && ANIM_RANGE.speechStart <= ANIM_RANGE.speechEnd) state._previewRange = { start: ANIM_RANGE.speechStart, end: ANIM_RANGE.speechEnd }; },
    chat_bottom:     () => {
      CONFIG._chatBottom = parseFloat(v);
      if (window.innerWidth > 600)
        document.documentElement.style.setProperty('--chat-bottom', `${parseFloat(v)}px`);
      applyOverlay(CONFIG._overlayColor || '#0a0a0f', CONFIG._overlayOpacity ?? 0.75);
    },
    chat_max_width:  () => { document.documentElement.style.setProperty('--chat-max-width', `${v}%`); },
    chat_align:      () => {
      const p = document.getElementById('interaction-panel');
      p.classList.remove('align-left','align-center','align-right');
      p.classList.add(`align-${v}`);
    },
    chat_hide_input: () => {
      document.getElementById('input-area').classList.toggle('hidden', parseInt(v) === 1);
    },
    chat_font:      () => {
      const el = document.getElementById('interaction-panel');
      if (!el) return;
      if (v) {
        const link = document.getElementById('_chat-font-link') || document.createElement('link');
        link.id = '_chat-font-link'; link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(v).replace(/%20/g,'+')}&display=swap`;
        document.head.appendChild(link);
        el.style.setProperty('--chat-font-family', `'${v}', sans-serif`);
      } else {
        el.style.setProperty('--chat-font-family', 'inherit');
      }
    },
    chat_font_size: () => {
      CONFIG.chatFontSize = parseFloat(v);
      const size = window.innerWidth <= 600 ? '1rem' : (v + 'rem');
      document.getElementById('interaction-panel')?.style.setProperty('--chat-font-size', size);
    },
    model_file:   () => {
      const url = v ? `/${v}` : null;
      if (!url || url === CONFIG.avatarModelUrl) return;
      CONFIG.avatarModelUrl = url;
      if (state.avatar) { scene.remove(state.avatar); state.avatar = null; state.mixer = null; state.mainAction = null; anim.bones = {}; }
      loadGLBAvatar(url + '?t=' + Date.now());
    },
    show_controls:     () => { document.getElementById('controls-section').style.display = parseInt(v) !== 0 ? 'flex' : 'none'; },
    mic_icon:          () => { CONFIG.micIcon         = v; CONFIG._iconTs = Date.now(); updateMicBtn(); },
    mic_icon_disabled: () => { CONFIG.micIconDisabled = v; CONFIG._iconTs = Date.now(); updateMicBtn(); },
    mic_icon_size:   () => { CONFIG.micIconSize   = +v; updateMicBtn(); },
    mic_icon_x:      () => { CONFIG.micIconX      = +v; updateMicBtn(); },
    mic_icon_y:      () => { CONFIG.micIconY      = +v; updateMicBtn(); },
    audio_icon:          () => { CONFIG.audioIcon         = v; CONFIG._iconTs = Date.now(); updateAudioBtn(); },
    audio_icon_disabled: () => { CONFIG.audioIconDisabled = v; CONFIG._iconTs = Date.now(); updateAudioBtn(); },
    audio_icon_size: () => { CONFIG.audioIconSize = +v; updateAudioBtn(); },
    audio_icon_x:      () => { CONFIG.audioIconX    = +v; updateAudioBtn(); },
    audio_icon_y:      () => { CONFIG.audioIconY    = +v; updateAudioBtn(); },
    mic_wave_color:       () => { CONFIG.micWaveColor       = v; applyWaveColors(); },
    audio_wave_color:     () => { CONFIG.audioWaveColor     = v; applyWaveColors(); },
    mic_visible:                 () => { CONFIG.micVisible              = v !== 0 && v !== false; updateMicBtn(); },
    mic_bg_color:                () => { CONFIG.micBgColor              = v; updateMicBtn(); },
    mic_disabled_color:          () => { CONFIG.micDisabledColor        = v; updateMicBtn(); },
    mic_border_color:            () => { CONFIG.micBorderColor          = v; updateMicBtn(); },
    mic_border_disabled_color:   () => { CONFIG.micBorderDisabledColor  = v; updateMicBtn(); },
    audio_visible:               () => { CONFIG.audioVisible            = v !== 0 && v !== false; updateAudioBtn(); },
    audio_bg_color:              () => { CONFIG.audioBgColor            = v; updateAudioBtn(); },
    audio_disabled_color:        () => { CONFIG.audioDisabledColor      = v; updateAudioBtn(); },
    audio_border_color:          () => { CONFIG.audioBorderColor        = v; updateAudioBtn(); },
    audio_border_disabled_color: () => { CONFIG.audioBorderDisabledColor= v; updateAudioBtn(); },
    theme:             () => applyTheme(v),
  };

  map[key]?.();
}

async function initAvatar() {
  try {
    const endpoint = IS_PREVIEW ? `/api/preview/${AVATAR_ID}` : `/api/avatar/${AVATAR_ID}`;
    const res  = await fetch(endpoint);
    const cfg  = await res.json();
    if (!res.ok) throw new Error(cfg.error);

    // Applica config
    CONFIG.avatarId      = AVATAR_ID;
    CONFIG.avatarName    = cfg.name;
    CONFIG.avatarModelUrl = cfg.model_file ? `/${cfg.model_file}` : null;
    CONFIG.micIcon         = cfg.mic_icon          || '';
    CONFIG.micIconDisabled = cfg.mic_icon_disabled || '';
    CONFIG.micIconSize   = cfg.mic_icon_size   ?? 44;
    CONFIG.micIconX      = cfg.mic_icon_x      ?? 0;
    CONFIG.micIconY      = cfg.mic_icon_y      ?? 0;
    CONFIG.audioIcon         = cfg.audio_icon          || '';
    CONFIG.audioIconDisabled = cfg.audio_icon_disabled || '';
    CONFIG.audioIconSize = cfg.audio_icon_size ?? 44;
    CONFIG.audioIconX      = cfg.audio_icon_x      ?? 0;
    CONFIG.audioIconY      = cfg.audio_icon_y      ?? 0;
    CONFIG.micWaveColor      = cfg.mic_wave_color      || '#ffffff';
    CONFIG.audioWaveColor    = cfg.audio_wave_color    || '#ffffff';
    CONFIG.micVisible              = (cfg.mic_visible   ?? 1) !== 0;
    CONFIG.micBgColor              = cfg.mic_bg_color              || 'rgba(248,113,113,0.15)';
    CONFIG.micDisabledColor        = cfg.mic_disabled_color        || 'rgba(248,113,113,0.15)';
    CONFIG.micBorderColor          = cfg.mic_border_color          || 'rgba(34,211,160,0.5)';
    CONFIG.micBorderDisabledColor  = cfg.mic_border_disabled_color || 'rgba(248,113,113,0.4)';
    CONFIG.audioVisible            = (cfg.audio_visible ?? 1) !== 0;
    CONFIG.audioBgColor            = cfg.audio_bg_color            || 'rgba(34,211,160,0.15)';
    CONFIG.audioDisabledColor      = cfg.audio_disabled_color      || 'rgba(34,211,160,0.15)';
    CONFIG.audioBorderColor        = cfg.audio_border_color        || 'rgba(34,211,160,0.5)';
    CONFIG.audioBorderDisabledColor= cfg.audio_border_disabled_color|| 'rgba(248,113,113,0.4)';
    CONFIG._iconTs           = Date.now();
    applyWaveColors();

    // Animazioni
    ANIM_RANGE.idleStart   = cfg.idle_start;
    ANIM_RANGE.idleEnd     = cfg.idle_end;
    ANIM_RANGE.speechStart = cfg.speech_start;
    ANIM_RANGE.speechEnd   = cfg.speech_end;
    CONFIG.animPingPong    = !!cfg.anim_pingpong;

    // Posizione avatar
    CONFIG.avatarScale   = cfg.avatar_scale;
    CONFIG.avatarOffsetX = cfg.avatar_offset_x;
    CONFIG.avatarOffsetY = cfg.avatar_offset_y;
    CONFIG.avatarRotY    = cfg.avatar_rot_y;
    CONFIG.cameraZ       = cfg.camera_z;
    CONFIG.cameraY       = cfg.camera_y;
    CONFIG.cameraLookAtY = cfg.camera_look_at_y;

    // Sfondo
    const bgVid = document.getElementById('avatar-bg-video');
    if (cfg.bg_video) {
      bgVid.src = `/${cfg.bg_video}`;
      bgVid.style.display = 'block';
      document.getElementById('avatar-panel').style.background = 'transparent';
      document.body.style.background = '#0a0a0f';
    } else {
      bgVid.src = ''; bgVid.style.display = 'none';
      const bg = cfg.background || '#0a0a0f';
      if (bg.startsWith('#') || bg.startsWith('rgb')) {
        document.body.style.background = bg;
        document.getElementById('avatar-panel').style.background =
          `radial-gradient(ellipse at 50% 60%, ${bg}aa 0%, ${bg} 70%)`;
      } else {
        document.getElementById('avatar-panel').style.backgroundImage = `url(/${bg})`;
        document.getElementById('avatar-panel').style.backgroundSize  = 'cover';
        document.getElementById('avatar-panel').style.backgroundPosition = 'center';
      }
    }

    // Overlay layer
    CONFIG._overlayHeight = cfg.overlay_height ?? 65;
    applyOverlay(cfg.overlay_color || '#0a0a0f', cfg.overlay_opacity ?? 0.75);
    document.documentElement.style.setProperty('--overlay-height', `${CONFIG._overlayHeight}vh`);
    CONFIG._chatBottom = cfg.chat_bottom ?? 0;
    if (window.innerWidth > 600)
      document.documentElement.style.setProperty('--chat-bottom', `${CONFIG._chatBottom}px`);
    document.documentElement.style.setProperty('--chat-max-width', `${cfg.chat_max_width ?? 100}%`);
    applyParamLive('chat_align',      cfg.chat_align      || 'center');
    applyParamLive('chat_hide_input', cfg.chat_hide_input ?? 0);
    applyParamLive('chat_font',      cfg.chat_font      || '');
    applyParamLive('chat_font_size', cfg.chat_font_size ?? 1.0);
    window.addEventListener('resize', () => {
      applyParamLive('chat_font_size', CONFIG.chatFontSize ?? 1.0);
      applyParamLive('chat_bottom', CONFIG._chatBottom ?? 0);
      updateMicBtn();
      updateAudioBtn();
    });
    applyParamLive('show_controls',   cfg.show_controls   ?? 1);
    applyTheme(cfg.theme || 'viola');
    updateMicBtn();
    updateAudioBtn();

    // UI
    document.getElementById('avatar-response-label').textContent = cfg.name.toUpperCase();
    document.getElementById('idle-title').textContent = cfg.idle_title ?? '';
    document.getElementById('idle-subtitle').textContent = cfg.idle_subtitle ?? '';
    const idleIconEmoji = document.getElementById('idle-icon-emoji');
    if (idleIconEmoji) idleIconEmoji.textContent = cfg.idle_icon || '🤖';
    document.getElementById('idle-hint').textContent = cfg.idle_hint ?? '';
    applyIdleParam('idle_icon_img',  cfg.idle_icon_img  || '');
    applyIdleParam('idle_video',     cfg.idle_video     || '');
    applyIdleParam('idle_bg_image',       cfg.idle_bg_image       || '');
    CONFIG._idleBgColorAlpha = cfg.idle_bg_color_alpha ?? 1;
    applyIdleParam('idle_bg_color',       cfg.idle_bg_color       || '');
    applyIdleParam('idle_bg_opacity',     cfg.idle_bg_opacity     ?? 1);
    applyIdleParam('idle_font',      cfg.idle_font      || '');
    applyIdleParam('idle_font_size', cfg.idle_font_size ?? 1.0);
    CONFIG.idleTimeout = (cfg.idle_timeout ?? 90) * 1000;
    CONFIG.idleDisabled = !!(cfg.idle_disabled);
    CONFIG.wakeWordEnabled = !!(cfg.wake_word_enabled);
    CONFIG.wakeWordAlwaysRequired = !!(cfg.wake_word_always);
    if (CONFIG.wakeWordEnabled || CONFIG.wakeWordAlwaysRequired) startWakeWord();
    if (CONFIG.idleDisabled) {
      document.getElementById('idle-overlay').classList.add('hidden');
      setControlsVisible(true);
    }

    // Aggiorna camera
    camera.position.set(0, CONFIG.cameraY, CONFIG.cameraZ);
    camera.lookAt(0, CONFIG.cameraLookAtY, 0);

    // Carica modello
    if (CONFIG.avatarModelUrl) {
      loadGLBAvatar(CONFIG.avatarModelUrl + '?t=' + Date.now());
    } else {
      createPlaceholderAvatar();
    }

  } catch (err) {
    console.error('Errore caricamento avatar:', err);
    createPlaceholderAvatar();
  }
}

// Avvia caricamento senza bloccare il rendering iniziale
requestAnimationFrame(() => initAvatar());
</script>
</body>
</html>
