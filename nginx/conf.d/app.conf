server {
    listen 80;
    server_name avatar.nova-ai.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name avatar.nova-ai.it;

    ssl_certificate     /etc/letsencrypt/live/avatar.nova-ai.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avatar.nova-ai.it/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 200M;

    location / {
        proxy_pass http://avatar-kiosk:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name chatbot.nova-ai.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name chatbot.nova-ai.it;

    ssl_certificate     /etc/letsencrypt/live/chatbot.nova-ai.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.nova-ai.it/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Endpoint backend: login, chat, profili, notifiche, file generati, ecc.
    location ~ ^/(login|logout|forgot-password|auth|callback|health|webhook|avatar|chat|profiles|sessions|settings|notifications|users|automations|onboarding|html|pdf|webview|upload|usage) {
        set $backend http://nova-backend-1:4001;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # license/activate e license/refresh → backend
    location ~ ^/license/(activate|refresh)$ {
        set $backend http://nova-backend-1:4001;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # tutto il resto di /license/ → license server
    location /license/ {
        set $license http://nova-license-1:8765;
        rewrite ^/license/(.*)$ /$1 break;
        proxy_pass $license;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # mcp/info e mcp/token → backend Nova (non MCP server)
    location ~ ^/mcp/(info|token) {
        set $backend http://nova-backend-1:4001;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /mcp {
        set $mcp http://nova-mcp-1:4003;
        proxy_pass $mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://172.20.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name nutriai.nova-ai.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nutriai.nova-ai.it;

    ssl_certificate     /etc/letsencrypt/live/nutriai.nova-ai.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nutriai.nova-ai.it/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;
    resolver 127.0.0.11 valid=10s;

    location ~* ^/(profile|diary|meals|weight|activities|uploads|health) {
        proxy_pass http://nutriai-backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://nutriai-frontend-1:80;
        proxy_set_header Host $host;
    }
}
